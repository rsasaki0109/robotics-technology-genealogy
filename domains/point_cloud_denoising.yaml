name: Point Cloud Denoising
description: >
  Evolution of point cloud denoising methods — from traditional filtering
  to deep learning and score-based approaches.
source_awesome_lists:
  - https://github.com/chaoyueziji/awesome-3d-point-cloud-denoising

methods:
  # === Traditional ===
  - name: "Bilateral Filter (PC)"
    paper: "Bilateral Mesh Denoising"
    year: 2003
    tags: [traditional, filtering]
    parents: []
    description: "Bilateral filtering adapted for mesh/point cloud denoising"

  - name: "Jet Fitting"
    paper: "Estimating Differential Quantities Using Polynomial Fitting of Osculating Jets"
    year: 2005
    tags: [traditional, surface-fitting]
    parents: []
    description: "Polynomial jet fitting for surface estimation and denoising"

  # === Early Learning ===
  - name: "PointCleanNet"
    paper: "PointCleanNet: Learning to Denoise and Remove Outliers from Dense Point Clouds"
    arxiv: "1901.01060"
    year: 2019
    code: "mrakotosaon/pointcleannet"
    stars: 200
    tags: [deep-learning, outlier-removal]
    parents:
      - name: "Bilateral Filter (PC)"
        relation: replaces
    description: "First deep learning approach for point cloud denoising and outlier removal"

  - name: "PCN (Total Denoising)"
    paper: "Total Denoising: Unsupervised Learning of 3D Point Cloud Cleaning"
    arxiv: "1904.07615"
    year: 2019
    tags: [deep-learning, unsupervised]
    parents:
      - name: "PointCleanNet"
        relation: extends
    description: "Unsupervised point cloud denoising without clean ground truth"

  # === Score-based ===
  - name: "Score-Based Denoising"
    paper: "Score-Based Point Cloud Denoising"
    arxiv: "2107.10981"
    year: 2021
    code: "luost26/score-denoise"
    stars: 200
    tags: [score-based, gradient-field]
    parents:
      - name: "PointCleanNet"
        relation: replaces
    description: "Estimates score (gradient of log-probability) of noise-free surface"

  - name: "IterativePFN"
    paper: "IterativePFN: True Iterative Point Cloud Filtering"
    arxiv: "2304.01529"
    year: 2023
    code: "ddsediri/IterativePFN"
    stars: 60
    tags: [deep-learning, iterative]
    parents:
      - name: "Score-Based Denoising"
        relation: extends
    description: "Iterative filtering network with progressive denoising"

  # === Transformer-based ===
  - name: "RePCD-Net"
    paper: "RePCD-Net: Feature-Aware Recurrent Point Cloud Denoising Network"
    arxiv: "2202.00866"
    year: 2022
    tags: [deep-learning, recurrent, feature-aware]
    parents:
      - name: "PointCleanNet"
        relation: extends
    description: "Recurrent network leveraging multi-scale features for denoising"

  - name: "GeoDream (PC Denoising)"
    paper: "3D Point Cloud Denoising via Bipartite Graph Approximation and Resampling"
    arxiv: "2310.09629"
    year: 2024
    tags: [graph-based, resampling]
    parents:
      - name: "Score-Based Denoising"
        relation: extends
    description: "Graph-based denoising with bipartite approximation"

  # === Diffusion-based ===
  - name: "PD-Flow"
    paper: "PD-Flow: A Point Cloud Denoising Framework with Normalizing Flows"
    arxiv: "2203.05940"
    year: 2022
    code: "unknownue/pdflow"
    stars: 50
    tags: [normalizing-flow, generative]
    parents:
      - name: "Score-Based Denoising"
        relation: inspires
    description: "Normalizing flow-based generative approach for point cloud denoising"
